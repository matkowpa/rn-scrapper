name: Scrape – Rada Nadzorcza

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC (08:00 PL lato)
    - cron: "0 11 * * *"   # 11:00 UTC (13:00 PL lato)
    - cron: "0 16 * * *"   # 16:00 UTC (18:00 PL lato)
  workflow_dispatch:         # możliwość ręcznego uruchomienia z GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # potrzebne do git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py --months 1

      - name: Move report to docs/index.html
        run: |
          mkdir -p docs
          # weź najnowszy wygenerowany raport i skopiuj jako index.html
          LATEST=$(ls -t raport_rada_nadzorcza_*.html | head -1)
          cp "$LATEST" docs/index.html
          echo "Skopiowano: $LATEST -> docs/index.html"

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Raport $(date +'%Y-%m-%d %H:%M') UTC"
          git push
